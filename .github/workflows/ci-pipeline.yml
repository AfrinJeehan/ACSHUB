
name: Buyer Onboarding Full-Stack CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-validation:
    name: FastAPI Quality Control
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up subsequent runs by caching packages

    - name: Install Backend Dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Pytest Suite
      run: |
        cd backend
        pytest

  frontend-validation:
    name: React Quality Control
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/setup-python@v5 # Setting up base tool, but we use native node action next
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Verify Production Compilation
      run: |
        cd frontend
        npm run build --if-present